<form id="contactForm" action="https://formsubmit.co/info@jkjsolartech.co.za" method="POST">
    
    <!-- Hidden Settings -->
    <input type="hidden" name="_subject" value="New Quote Request - JKJ Solartech Website">
    <input type="hidden" name="_next" value="thank-you.html">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_template" value="table">

    <div class="form-row">
        <div class="form-group">
            <label for="name">Full Name *</label>
            <input type="text" id="name" name="name" placeholder="Your full name" required>
        </div>

        <div class="form-group">
            <label for="phone">Phone Number *</label>
            <input type="tel" id="phone" name="phone" placeholder="Your phone number" required>
        </div>
    </div>

    <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="your@email.com">
    </div>

    <div class="form-group">
        <label for="area">Your Area</label>
        <input type="text" id="area" name="area" placeholder="e.g. Sandton, Midrand, Randburg">
    </div>

    <div class="form-group">
        <label for="service">Service Required *</label>
        <select id="service" name="service" required>
            <option value="">Select a service</option>
            <option value="Solar & Backup Power">Solar & Backup Power</option>
            <option value="Electrical Services">Electrical Services</option>
            <option value="CCTV & Security Systems">CCTV & Security Systems</option>
            <option value="Automated Gates">Automated Gates</option>
            <option value="Access Control">Access Control</option>
            <option value="Network & Fibre Installations">Network & Fibre Installations</option>
            <option value="General Maintenance">General Maintenance</option>
            <option value="Other">Other</option>
        </select>
    </div>

    <div class="form-group">
        <label for="message">Project Details</label>
        <textarea id="message" name="message" placeholder="Describe your project or issue..."></textarea>
    </div>

    <button type="submit" class="btn btn-primary">
        Send Quote Request
    </button>

    <!-- Conversion Boost -->
    <p style="font-size: 12px; margin-top: 10px; color: #aaa;">
        We respond within 2 hours. No spam. No pressure.
    </p>

</form>
